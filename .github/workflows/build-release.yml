name: Build and Package Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Package Chrome Extension
        run: |
          mkdir -p dist
          cd yandex-sync-extension
          zip -r ../dist/yandex-music-sync-extension.zip manifest.json popup.html popup.js socket.io.js isolated.js main.js background.js soundcloud-bridge.js
          cd ..

      - name: Package Desktop Patcher
        run: |
          cd yandex-sync-electron
          zip -r ../dist/yandex-music-sync-desktop.zip patch.js debug-patch.js desktop-sync.js socket.io.js patch.sh patch.bat
          cd ..

      - name: Build GUI Installer (Windows & Linux)
        run: |
          cd yandex-sync-installer
          npm install
          npx electron-builder --win --linux
          cp dist/*.exe ../dist/ || true
          cp dist/*.AppImage ../dist/ || true
          cd ..

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-releases
          path: dist/*

  build-mac:
    name: Build Installer (macOS)
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Build GUI Installer (macOS)
        run: |
          cd yandex-sync-installer
          npm install
          CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac
          mkdir -p ../dist
          cp dist/*.dmg ../dist/ || true
          cd ..

      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-releases
          path: dist/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-merged
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-merged/yandex-music-sync-extension.zip
            dist-merged/yandex-music-sync-desktop.zip
            dist-merged/*.exe
            dist-merged/*.AppImage
            dist-merged/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
